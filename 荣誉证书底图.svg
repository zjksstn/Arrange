<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1130" width="100%" height="100%">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdf9" />
      <stop offset="100%" stop-color="#f5ede0" />
    </linearGradient>

    <!-- 雅致大马士革暗纹图案 -->
    <pattern id="damask-pattern" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M50 0 C60 20, 80 30, 100 50 C80 70, 60 80, 50 100 C40 80, 20 70, 0 50 C20 30, 40 20, 50 0 Z" fill="#ebd9c1" fill-opacity="0.12" />
      <circle cx="50" cy="50" r="3" fill="#ebd9c1" fill-opacity="0.15"/>
      <path d="M0 0 C10 10, 10 20, 0 30" stroke="#ebd9c1" stroke-opacity="0.1" fill="none"/>
      <path d="M100 0 C90 10, 90 20, 100 30" stroke="#ebd9c1" stroke-opacity="0.1" fill="none"/>
    </pattern>

    <!-- 左右边框卷草纹重复单元 -->
    <pattern id="side-border" width="40" height="80" patternUnits="userSpaceOnUse">
      <path d="M 20 0 
               C 10 10, 5 20, 20 30 
               C 35 40, 30 50, 20 60 
               C 10 70, 15 75, 20 80" stroke="#5c2e16" stroke-width="1.5" fill="none" opacity="0.8"/>
      <path d="M 20 15 C 28 15, 30 5, 20 5 C 10 5, 12 15, 20 15 Z" fill="#5c2e16" opacity="0.6"/>
      <circle cx="20" cy="45" r="2.5" fill="#5c2e16" opacity="0.8"/>
    </pattern>
  </defs>

  <!-- 1. 背景 -->
  <rect width="800" height="1130" fill="url(#bg-grad)" />
  <rect width="800" height="1130" fill="url(#damask-pattern)" />

  <!-- 2. 内辅助细线边框 -->
  <rect x="40" y="40" width="720" height="1050" rx="10" fill="none" stroke="#5c2e16" stroke-width="1" opacity="0.3" />
  <rect x="45" y="45" width="710" height="1040" rx="8" fill="none" stroke="#c0a080" stroke-width="1.5" opacity="0.5" />

  <!-- 3. 左右花饰边框 -->
  <rect x="25" y="110" width="40" height="910" fill="url(#side-border)" />
  <rect x="735" y="110" width="40" height="910" fill="url(#side-border)" transform="scale(-1, 1) translate(-800, 0)" />

  <!-- 4. 顶部华丽皇冠花头 (仿照原图设计) -->
  <g transform="translate(400, 85)" fill="#5c2e16">
    <!-- 皇冠/棋子象征 -->
    <path d="M -15 -15 L -25 5 L 25 5 L 15 -15 L 0 -5 Z" />
    <circle cx="0" cy="-22" r="5" />
    <circle cx="-16" cy="-20" r="3.5" />
    <circle cx="16" cy="-20" r="3.5" />
    
    <!-- 核心圆环 -->
    <circle cx="0" cy="22" r="18" fill="none" stroke="#5c2e16" stroke-width="3" />
    <circle cx="0" cy="22" r="13" fill="none" stroke="#5c2e16" stroke-width="1" opacity="0.7" />
    
    <!-- 左右舒展的藤蔓 (左侧) -->
    <path d="M -22 22 
             C -40 22, -60 10, -80 25 
             C -100 40, -120 15, -140 20 
             C -160 25, -180 5, -210 15 
             C -230 22, -250 5, -280 20
             C -290 25, -310 15, -330 35
             L -330 32
             C -310 10, -290 20, -280 15
             C -250 0, -230 17, -210 10
             C -180 0, -160 20, -140 15
             C -120 10, -100 35, -80 20
             C -60 5, -40 17, -22 17 Z" />
    <!-- 辅助卷叶 -->
    <path d="M -90 22 C -110 -5, -140 5, -130 25 C -125 35, -110 25, -112 18 C -115 10, -100 10, -90 22 Z" />
    <path d="M -180 15 C -200 -10, -220 0, -215 18 C -210 25, -195 20, -198 12 C -200 5, -190 5, -180 15 Z" />
    <path d="M -270 18 C -285 2, -300 10, -295 22 C -292 27, -282 22, -284 16 C -285 10, -278 10, -270 18 Z" />

    <!-- 右侧对称藤蔓 -->
    <g transform="scale(-1, 1)">
      <path d="M -22 22 
               C -40 22, -60 10, -80 25 
               C -100 40, -120 15, -140 20 
               C -160 25, -180 5, -210 15 
               C -230 22, -250 5, -280 20
               C -290 25, -310 15, -330 35
               L -330 32
               C -310 10, -290 20, -280 15
               C -250 0, -230 17, -210 10
               C -180 0, -160 20, -140 15
               C -120 10, -100 35, -80 20
               C -60 5, -40 17, -22 17 Z" />
      <path d="M -90 22 C -110 -5, -140 5, -130 25 C -125 35, -110 25, -112 18 C -115 10, -100 10, -90 22 Z" />
      <path d="M -180 15 C -200 -10, -220 0, -215 18 C -210 25, -195 20, -198 12 C -200 5, -190 5, -180 15 Z" />
      <path d="M -270 18 C -285 2, -300 10, -295 22 C -292 27, -282 22, -284 16 C -285 10, -278 10, -270 18 Z" />
    </g>
  </g>

  <!-- 5. 底部对称花饰 -->
  <g transform="translate(400, 1045)" fill="#5c2e16">
    <!-- 中央火炬/花蕾 -->
    <path d="M 0 -15 C -8 -5, -12 10, 0 20 C 12 10, 8 -5, 0 -15 Z" />
    <path d="M -5 -5 C -15 -25, -30 -10, -20 5" stroke="#5c2e16" stroke-width="2" fill="none"/>
    <path d="M 5 -5 C 15 -25, 30 -10, 20 5" stroke="#5c2e16" stroke-width="2" fill="none"/>

    <!-- 左右蔓延的藤蔓 (左侧) -->
    <path d="M -20 10 
             C -40 10, -60 -2, -80 13 
             C -100 28, -120 3, -140 8 
             C -160 13, -180 -7, -210 3 
             C -230 10, -250 -7, -280 8
             C -290 13, -310 3, -330 23
             L -330 20
             C -310 -2, -290 8, -280 3
             C -250 -12, -230 5, -210 -2
             C -180 -12, -160 8, -140 3
             C -120 -2, -100 23, -80 8
             C -60 -7, -40 5, -20 5 Z" />
             
    <!-- 右侧对称藤蔓 -->
    <g transform="scale(-1, 1)">
      <path d="M -20 10 
               C -40 10, -60 -2, -80 13 
               C -100 28, -120 3, -140 8 
               C -160 13, -180 -7, -210 3 
               C -230 10, -250 -7, -280 8
               C -290 13, -310 3, -330 23
               L -330 20
               C -310 -2, -290 8, -280 3
               C -250 -12, -230 5, -210 -2
               C -180 -12, -160 8, -140 3
               C -120 -2, -100 23, -80 8
               C -60 -7, -40 5, -20 5 Z" />
    </g>
  </g>

  <!-- 6. 棋盘格子暗纹装饰 (四角或边缘点缀) -->
  <g opacity="0.1" fill="#5c2e16">
    <!-- 左上角迷你棋盘 -->
    <rect x="60" y="60" width="10" height="10"/>
    <rect x="80" y="60" width="10" height="10"/>
    <rect x="70" y="70" width="10" height="10"/>
    <rect x="90" y="70" width="10" height="10"/>
    <rect x="60" y="80" width="10" height="10"/>
    <rect x="80" y="80" width="10" height="10"/>
    <!-- 右上角迷你棋盘 -->
    <rect x="730" y="60" width="10" height="10"/>
    <rect x="710" y="60" width="10" height="10"/>
    <rect x="720" y="70" width="10" height="10"/>
    <rect x="700" y="70" width="10" height="10"/>
    <rect x="730" y="80" width="10" height="10"/>
    <rect x="710" y="80" width="10" height="10"/>
  </g>
  
  <!-- 7. 正中浅底色文字预留标志 (可删改) -->
  <g transform="translate(400, 565)" opacity="0.05" fill="#5c2e16">
    <!-- 大型暗纹棋子（兵/后/马的剪影，这里用皇冠融合麦穗） -->
    <path d="M -50 100 L 50 100 L 40 80 L -40 80 Z" />
    <path d="M -35 80 C -30 20, -50 -20, 0 -60 C 50 -20, 30 20, 35 80 Z" />
    <circle cx="0" cy="-75" r="15" />
  </g>
</svg>
